site_name: Duniya Documentation
site_description: The operating system for modern pharmacies. Complete documentation for the Duniya pharmacy management platform.
site_url: https://chama18.github.io/Duniya/
repo_url: https://github.com/CHAMA18/Duniya
repo_name: CHAMA18/Duniya
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/images/duniya-logo-mark.svg
  favicon: assets/images/favicon.svg
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - scheme: default
      primary: deep-purple
      accent: deep-purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep-purple
      accent: deep-purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/extra.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - tags
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CHAMA18/Duniya
      name: Duniya on GitHub
  generator: false
  status:
    new: Recently added
    deprecated: Deprecated
    experimental: Experimental

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Quickstart: getting-started/quickstart.md
    - Core Concepts: getting-started/concepts.md
  - Modules:
    - modules/index.md
    - Home & Dashboard: modules/home.md
    - Store Inventory: modules/store-inventory.md
    - Product Catalogue: modules/product-catalogue.md
    - Stock Movements: modules/stock-movements.md
    - Stock Balances: modules/stock-balances.md
    - Stock Counts: modules/stock-counts.md
    - Goods Received: modules/goods-received.md
    - Batches & Expiry: modules/batches.md
    - Low Stock Alerts: modules/low-stock-alerts.md
    - Replenishment: modules/replenishment.md
    - Sales & Dispensing: modules/sales.md
    - My Pharmacies: modules/my-pharmacies.md
    - Manage Pharmacy: modules/manage-pharmacy.md
    - Human Resource: modules/human-resource.md
    - Finances: modules/finances.md
    - Pending Approvals: modules/pending-approvals.md
    - Notifications: modules/notifications.md
    - Pharmacy Tools: modules/pharmacy-tools.md
    - Settings: modules/settings.md
  - Roles & Permissions:
    - Overview: roles/overview.md
    - Role Reference: roles/reference.md
  - Workflows:
    - workflows/index.md
    - The Inventory Cycle: workflows/inventory-cycle.md
    - Bulk Import Inventory: workflows/bulk-import.md
    - Multi-Pharmacy Setup: workflows/multi-pharmacy-setup.md
  - Developer Guide:
    - developer/index.md
    - Architecture: developer/architecture.md
    - Data Model: developer/data-model.md
    - Build & Deploy: developer/build-deploy.md
