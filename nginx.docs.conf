# nginx configuration for serving the Duniya static documentation site.
# Tuned for MkDocs Material output (lots of JS/CSS + JSON search index).

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression (docs site has lots of JS/CSS/JSON)
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 9;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        application/manifest+json;

    # Long-lived cache for versioned static assets (MkDocs hashes JS/CSS bundles)
    location ~* ^/assets/(.*)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Search index — short cache so updates propagate quickly
    location = /search/search_index.json {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # sitemap.xml — short cache
    location = /sitemap.xml {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
        default_type application/xml;
    }

    # MkDocs Material uses clean URLs (e.g. /modules/store-inventory/)
    # — fall back to index.html in the matching directory, then to /404.html
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Custom 404 — MkDocs builds /404.html
    error_page 404 /404.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
