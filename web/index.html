<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    Alternatively, build your application passing the --base-href parameter
    specifying the new root path of your web app.

    Fore more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MediTracker">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="MediTracker - Your Health Management App">
<meta name="keywords" content="health, medication, tracking, app">
<meta name="author" content="StackOne">
<meta property="og:title" content="MediTracker - Your Health Management App">
<meta property="og:description" content="Keep track of your health and medications with MediTracker.">
<meta property="og:url" content="https://www.meditrackerglobal.com">
<meta property="og:type" content="website">

  

  <!-- Favicon -->
  <link rel="icon" href="Vector.png" sizes="any"/>
  

  <!-- Open Graph & SEO tags -->
  <meta property="og:title" content="Meditracker" />
  <meta property="og:description" content="A pharmacy management application" />
  <meta property="og:image" content="/assets/assets/images/Artboard_1.png" /> 
  <meta name="twitter:title" content="Meditracker" />
  <meta name="twitter:description" content="A pharmacy management application" />
  <meta name="twitter:image" content="/assets/assets/images/Artboard_1.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <title> Meditracker </title>
  <meta name="description" content="A pharmacy management application" />
    

  <!-- Status Bar color in Safari browser (iOS) and PWA -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f1f4f8">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#1a1f24">

  <link rel="manifest" href="manifest.json">
  
</head>
<body>
  
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA3-HDfLffnuYVQUL4aR6DDPNqFWr5navE"></script>
  
  
  
  <script>
    {{flutter_bootstrap_js}}
  </script>
</body>
</html>
