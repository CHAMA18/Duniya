<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="duniyaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9900FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="duniyaGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background (maskable-friendly) -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#duniyaGrad)"/>

  <!-- Soft inner glow -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#duniyaGlow)"/>

  <!-- Decorative dotted ring (echoes the sidebar logo style) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round"/>

  <!-- Bold 'D' monogram -->
  <text x="256" y="256"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="300"
        font-weight="800"
        text-anchor="middle"
        dominant-baseline="central"
        fill="#FFFFFF">D</text>
</svg>
